name: meu projeto game simple deploy

on:
  push:
    branches:
      - main  

jobs:
  projeto:
    runs-on: ubuntu-latest  
    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      # 1. AUTENTICA NO GITHUB ACTIONS USANDO SUAS SECRETS
      - name: Configurar Credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2  # Região de Ohio configurada no seu Terraform

      # 2. FAZ LOGIN NO SEU REPOSITÓRIO ECR PRIVADO
      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. CONSTRÓI A IMAGEM DO FRONT-END E FAZ O PUSH PARA O ECR
      - name: Construir, Taggear e Push da imagem para o ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: minha_imagem  # Nome exato definido no seu ecr.tf
          IMAGE_TAG: latest
        run: |
          # Builda a imagem apontando para a sua pasta Frontend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./Frontend
          # Envia a imagem para o ECR da AWS
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. ENTRA NA EC2 VIA SSH (PORTA 22) E ATUALIZA O CONTAINER
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu  # Usuário padrão do Ubuntu na AWS
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Atualiza a lista de pacotes da máquina
            sudo apt-get update -y

            # Instala o Docker caso ele não esteja presente na máquina
            if ! command -v docker &> /dev/null; then
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # CORREÇÃO DO ERRO ANTERIOR: Instala o AWS CLI caso não exista na máquina
            if ! command -v aws &> /dev/null; then
              sudo apt-get install -y awscli
            fi

            # Autentica o Docker local da máquina EC2 dentro do seu ECR da AWS
            sudo aws ecr get-login-password --region us-east-2 | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # Remove o container antigo (se existir) para liberar a porta 80
            sudo docker stop meu-front || true
            sudo docker rm meu-front || true

            # Baixa a nova imagem que o GitHub Actions acabou de enviar para o ECR
            sudo docker pull ${{ steps.login-ecr.outputs.registry }}/minha_imagem:latest

            # Sobe o novo container mapeando para a porta pública 80
            sudo docker run -d --name meu-front -p 80:80 ${{ steps.login-ecr.outputs.registry }}/minha_imagem:latest