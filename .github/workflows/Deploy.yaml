name: meu projeto game simple deploy

on:
  push:
    branches:
      - main  

jobs:
  projeto:
    runs-on: ubuntu-latest  
    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      # 1. AUTENTICA NO GITHUB ACTIONS USANDO SUAS SECRETS
      - name: Configurar Credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2  # Região de Ohio configurada no seu Terraform

      # 2. FAZ LOGIN NO SEU REPOSITÓRIO ECR PRIVADO
      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. CONSTRÓI A IMAGEM DO FRONT-END E FAZ O PUSH PARA O ECR
      - name: Construir, Taggear e Push da imagem para o ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: minha_imagem  # Nome definido no seu ecr.tf
          IMAGE_TAG: latest
        run: |
          # Builda a imagem apontando para a sua pasta Frontend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./Frontend
          # Envia a imagem para o ECR da AWS
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. ENTRA NA EC2 VIA SSH (PORTA 22) E ATUALIZA O CONTAINER COM AS CREDENCIAIS CORRETAS
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Passando as chaves como variáveis de ambiente temporárias para a Action
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu  # Usuário padrão do Ubuntu na AWS
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # O comando envs abaixo diz ao SSH para carregar e permitir o uso dessas 3 variáveis dentro da EC2
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION
          script: |
            # Atualiza a lista de pacotes da máquina
            sudo apt-get update -y

            # Instala o Docker caso ele não esteja presente na máquina
            if ! command -v docker &> /dev/null; then
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # Instala o AWS CLI caso não exista na máquina
            if ! command -v aws &> /dev/null; then
              sudo apt-get install -y awscli
            fi

            # SOLUÇÃO DE CONTORNO: Força as variáveis diretamente na chamada do comando sem depender do sudo -E
            AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" AWS_DEFAULT_REGION="us-east-2" aws ecr get-login-password --region us-east-2 | sudo docker login --username AWS --password-stdin 960956258767.dkr.ecr.us-east-2.amazonaws.com

            # Remove o container antigo (se existir) para liberar a porta 80
            sudo docker stop meu-front || true
            sudo docker rm meu-front || true

            # Baixa a nova imagem atualizada que foi gerada no ECR
            sudo docker pull 960956258767.dkr.ecr.us-east-2.amazonaws.com/minha_imagem:latest

            # Sobe o novo container mapeando para a porta pública 80
            sudo docker run -d --name meu-front -p 80:80 960956258767.dkr.ecr.us-east-2.amazonaws.com/minha_imagem:latest